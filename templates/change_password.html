{% extends "base.html" %}

{% block title %}Change Password - Crypto Tracker{% endblock %}

{% block content %}
<div class="profile-container">
    <div class="profile-card">
        <h2>Change Password</h2>
        <p class="profile-subtitle">Ensure your password is strong and unique</p>

        <form method="POST" action="{{ url_for('change_password') }}" class="profile-form">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" placeholder="Enter current password" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="min. 6 characters" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="repeat new password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Change Password</button>
                <a href="{{ url_for('profile') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
